<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bobimixyn 藥物劑量計算機</title>
    <style>
        :root { --primary-color: #00796b; --res-color: #d32f2f; }
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: #ffffff; width: 100%; max-width: 500px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: var(--primary-color); text-align: center; font-size: 22px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        .result-card { display: none; margin-top: 20px; padding: 15px; background: #fff; border: 2px solid var(--primary-color); border-radius: 8px; }
        .res-row { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .label-type { font-weight: bold; color: #333; margin-bottom: 5px; }
        
        .vial-num { font-size: 24px; font-weight: 800; color: var(--res-color); }
        .details { font-size: 15px; color: #555; }
        .freq-label { font-weight: 800; color: #c0392b; margin-left: 5px; }
        
        .notices { margin-top: 20px; font-size: 13px; line-height: 1.5; }
        .notice-box { padding: 10px; margin-bottom: 8px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bobimixyn 劑量計算機</h1>
    <div class="form-group">
        <label>病患體重 (kg)</label>
        <input type="number" id="weight" placeholder="請輸入體重..." oninput="calculate()">
    </div>
    <div class="form-group">
        <label>病患狀況</label>
        <select id="condition" onchange="calculate()">
            <option value="mild">輕症 (經驗性使用)</option>
            <option value="severe">重症病患</option>
        </select>
    </div>

    <div id="results" class="result-card">
        <div class="res-row">
            <div class="label-type">起始劑量 (Loading Dose)</div>
            <div id="res-loading"></div>
        </div>
        <div class="res-row">
            <div class="label-type">維持劑量 (Maintenance Dose)</div>
            <div id="res-maintenance"></div>
        </div>
    </div>

    <div class="notices">
        <div class="notice-box" style="background:#f8d7da; color:#721c24; font-weight:bold;">【免責聲明】非官方建立，僅供劑量參考，請務必依照醫師及藥師建議使用。</div>
        <div class="notice-box" style="background:#fff3cd; color:#856404;">【輸注液量建議】每 vial > 100ml，限水病患至少每 vial > 50ml。</div>
        <div class="notice-box" style="background:#fff3cd; color:#856404;">【特殊族群】肝腎功能不全、使用 ECMO、HD、CRRT、CAPD 患者，不需調整劑量。</div>
    </div>
</div>

<script>
    function calculate() {
        const w = parseFloat(document.getElementById('weight').value);
        const cond = document.getElementById('condition').value;
        if (!w || w < 40) { document.getElementById('results').style.display = 'none'; return; }

        let load, maint;
        const fmt = (v, k, m) => `<span class="vial-num">${v} vial</span> <span class="details">(${k}KU / ${m}mg)</span>`;

        if (cond === 'mild') {
            if (w < 50) { load = fmt(1.5, 800, 80); maint = fmt(1, 500, 50); }
            else if (w < 60) { load = fmt(2, 1000, 100); maint = fmt(1.25, 625, 62.5); }
            else if (w < 70) { load = fmt(2.5, 1200, 120); maint = fmt(1.5, 750, 75); }
            else if (w < 80) { load = fmt(3, 1400, 140); maint = fmt(1.75, 875, 87.5); }
            else { load = fmt(3.25, 1600, 160); maint = fmt(2, 1000, 100); }
        } else {
            if (w < 45) { load = fmt(2, 1000, 100); maint = fmt(1.2, 600, 60); }
            else if (w < 50) { load = fmt(2.25, 1125, 112.5); maint = fmt(1.35, 675, 67.5); }
            else if (w < 55) { load = fmt(2.5, 1250, 125); maint = fmt(1.5, 750, 75); }
            else if (w < 60) { load = fmt(2.75, 1375, 137.5); maint = fmt(1.65, 825, 82.5); }
            else if (w < 65) { load = fmt(3, 1500, 150); maint = fmt(1.8, 900, 90); }
            else if (w < 70) { load = fmt(3.25, 1625, 162.5); maint = fmt(1.95, 975, 97.5); }
            else if (w < 75) { load = fmt(3.5, 1750, 175); maint = fmt(2.1, 1050, 105); }
            else if (w < 80) { load = fmt(3.75, 1875, 187.5); maint = fmt(2.25, 1125, 112.5); }
            else { load = fmt(4, 2000, 200); maint = fmt(2.4, 1200, 120); }
        }
        
        // Q12H 已移至 vial 數與 KU/mg 之後，並加上明顯紅色標註
        document.getElementById('res-loading').innerHTML = load + " <br><small>建議輸注時間 > 2小時</small>";
        document.getElementById('res-maintenance').innerHTML = maint + " <span class=\"freq-label\">Q12H</span> <br><small>建議輸注時間 > 1小時</small>";
        
        document.getElementById('results').style.display = 'block';
    }
</script>
</body>
</html>
